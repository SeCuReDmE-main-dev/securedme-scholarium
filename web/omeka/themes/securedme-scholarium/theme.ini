[theme]
author = "SecuredMe"
title = "SecuredMe Scholarium"
description = "A locked pre-alpha research commons theme for SecuredMe Scholarium, designed around public reading and owner-controlled scholarly publishing."
license = "GPLv3"
website = "https://SecuredMe Scholarium"
support_link = "mailto:codex@securedme.ca"
omeka_minimum_version = "3.2"
omeka_target_version = "3.2"
version = "0.1.0"
tags = "research, archive, scholarly publishing, pre-alpha"

[config]
site_status.type = "text"
site_status.options.label = "Status label"
site_status.options.description = "Short public status shown in the header."
site_status.options.value = "Pre-alpha read-only"

primary_contact.type = "text"
primary_contact.options.label = "Primary contact"
primary_contact.options.description = "Visible contact address for applications and review."
primary_contact.options.value = "codex@securedme.ca"

